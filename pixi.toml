[project]
name = "data730"
channels = ["conda-forge", "r", "chuckpr"]
platforms = ["linux-64", "osx-64", "osx-arm64"]

[dependencies]
python = "3.9.*"
r-base = "*"
r-irkernel = "*"
r-tidymodels = "*"
r-tidyverse = "*"
r-vip = "*"
r-ranger = "*"
r-islr2 = "*"
r-moderndive = "*"
r-palmerpenguins = "*"
scikit-learn = "*"
plotnine = "*"
statsmodels = "*"
altair = "*"
patsy = "*"
pyarrow = "*"
ipykernel = "*"
jupyterlab = "*"

[pypi-dependencies]
palmerpenguins = "*"

[tasks]
lab = "jupyter lab --ip=0.0.0.0 --port=8888 --no-browser --allow-root --ServerApp.token='' --ServerApp.password=''"
